            setLogs((prev) => [...prev, { text: "Executando no sandbox...", type: "info" }]);

                setLogs((prev) => [...prev, { text: "Operação travada por segurança.", type: "error" }]);
                return;
              }
              const captured = [];
              const logger = (...msg) => captured.push(msg.join(" "));
              const runner = new Function("console", `
                try {
                  ${code}
                  const match = "${code}".match(/function\\s+([a-zA-Z0-9_]+)/);
                  if (match && match[1]) {
                    const res = eval(match[1])(5);
                    console("Dobro de 5 computado no sandbox: " + res);
                  }
                } catch(e) {
                   console("Erro do compilador: " + e.message);
                }
              `);
              runner(logger);
              setLogs((prev) => [
                ...prev,
                ...captured.map(m => ({ text: m, type: m.includes("Erro") ? "error" : "success" }))
              ]);
            } catch (err) {
              setLogs((prev) => [...prev, { text: err.toString(), type: "error" }]);
            }

          const checkAssertions = () => {
            const hasCorrectStructure = code.includes("* 2") || code.includes("olá") || code.includes("Olá") || code.includes("SELECT") || code.includes("def ");

        // ROOT APP MOUNT ELEMENT
        function App() {
          const [stats, setStats] = useState(() => {
            const local = localStorage.getItem("devquest_stats");
            return local ? JSON.parse(local) : { level: 1, xp: 0, xpNeeded: 1000, streak: 5, energy: 5, maxEnergy: 5, coins: 120, isPremium: false };
          });

          const [tracks, setTracks] = useState(() => {
            const local = localStorage.getItem("devquest_tracks");
            return local ? JSON.parse(local) : PREDEFINED_TRACKS;
          });

          const [achievements, setAchievements] = useState(() => {
            const local = localStorage.getItem("devquest_achievements");
            return local ? JSON.parse(local) : INITIAL_ACHIEVEMENTS;
          });

          const [activeTab, setActiveTab] = useState("dashboard");
          const [darkMode, setDarkMode] = useState(true);

          // Work elements
          const [activeChallenge, setActiveChallenge] = useState(null);
          const [activeChallengeTrackId, setActiveChallengeTrackId] = useState(null);

          const [hudAlert, setHudAlert] = useState(null);

          useEffect(() => localStorage.setItem("devquest_stats", JSON.stringify(stats)), [stats]);
          useEffect(() => localStorage.setItem("devquest_tracks", JSON.stringify(tracks)), [tracks]);
          useEffect(() => localStorage.setItem("devquest_achievements", JSON.stringify(achievements)), [achievements]);

          const awardXp = (amount) => {
            setStats((prev) => {
              let newXp = prev.xp + amount;
              let newLevel = prev.level;
              let newXpNeeded = prev.xpNeeded;
              let hasUp = false;

              while (newXp >= newXpNeeded) {
                newXp -= newXpNeeded;
                newLevel += 1;
                newXpNeeded = Math.round(newXpNeeded * 1.5);
                hasUp = true;
              }

              if (hasUp) {
                setHudAlert(`🎉 SENSACIONAL! Você subiu de nível! Agora você está no Nível ${newLevel}. Continue assim!`);
                setTimeout(() => setHudAlert(null), 5000);
              }

              return {
                ...prev,
                level: newLevel,
                xp: newXp,
                xpNeeded: newXpNeeded,
                coins: prev.coins + Math.round(amount * 0.25)
              };
            });
            unlockAchievement("first_steps");
          };

          const deductEnergy = (amount) => {
            setStats(prev => ({ ...prev, energy: Math.max(0, prev.energy - amount) }));
          };

          const recoverEnergy = (cost, val) => {
            setStats((prev) => {
              if (prev.coins < cost) return prev;
              return {
                ...prev,
                energy: Math.min(prev.maxEnergy, prev.energy + val),
                coins: Math.max(0, prev.coins - cost)
              };
            });
          };

          const awardCoins = (amount) => {
            setStats(prev => ({ ...prev, coins: Math.max(0, prev.coins + amount) }));
          };

          const onCompleteLesson = (trackId, lessonId, xpReward, coinsReward) => {
            setTracks((prev) =>
              prev.map((t) => {
                if (t.id === trackId) {
                  return {
                    ...t,
                    lessons: t.lessons.map(l => l.id === lessonId ? { ...l, completed: true } : l)
                  };
                }
                return t;
              })
            );
            awardXp(xpReward);
            awardCoins(coinsReward);
          };

          const onSelectCodeChallengeInSandbox = (lesson, trackId) => {
            setActiveChallenge(lesson);
            setActiveChallengeTrackId(trackId);
          };

          const onCompleteChallenge = (xpReward, coinsReward) => {
            awardXp(xpReward);
            awardCoins(coinsReward);
            if (activeChallenge && activeChallengeTrackId) {
              onCompleteLesson(activeChallengeTrackId, activeChallenge.id, 0, 0);
            }
            unlockAchievement("code_master");
          };

          const unlockAchievement = (id) => {
            setAchievements((prev) =>
              prev.map((a) => {
                if (a.id === id && !a.unlocked) {
                  awardXp(a.xpReward);
                  return { ...a, unlocked: true };
                }
                return a;
              })
            );
          };

          const triggerStreakMultiplier = () => {
            setStats(p => ({ ...p, streak: p.streak + 1 }));
            unlockAchievement("streak_3");
          };

          const activatePremiumInParentState = () => {
            setStats(p => ({ ...p, isPremium: true }));
            setHudAlert("👑 Licença DevQuest Premium PRO unbloqueada! Tutor Yuki está livre e Entrevistas ativadas.");
            setTimeout(() => setHudAlert(null), 5000);
          };

          const collectDailyChest = () => {
            awardCoins(50);
            awardXp(30);
            setHudAlert("🎁 Baú coletado com sucesso! Ganhou +50 moedas e +30 XP de presença.");
            setTimeout(() => setHudAlert(null), 4000);
          };

                      drinkCoffee={() => recoverEnergy(25, 3)}
                      openTrack={() => setActiveTab("lessons")}
                      collectDailyChest={collectDailyChest}
                    />
                  )}

                  {activeTab === "lessons" && (
                    <LessonsEngine
                      tracks={tracks}
                      stats={stats}
                      onCompleteLesson={onCompleteLesson}
                      deductEnergy={deductEnergy}
                      onSelectCodeChallenge={onSelectCodeChallengeInSandbox}
                      setActiveTab={setActiveTab}
                    />
                  )}

                  {activeTab === "sandbox" && (
                    <CodeSandbox
                      activeChallenge={activeChallenge}
                      trackId={activeChallengeTrackId}
                      stats={stats}
                      onCompleteChallenge={onCompleteChallenge}
                      awardCoins={awardCoins}
                    />
                  )}

                  {activeTab === "tutor" && (
                    <TutorHub
                      stats={stats}
                      awardXp={awardXp}
                      awardCoins={awardCoins}
                      markAchievementUnlocked={unlockAchievement}
                    />
                  )}

                  {activeTab === "interview" && (
                    <InterviewSim
                      stats={stats}
                      unlockAchievementInParent={unlockAchievement}
                      awardXp={awardXp}
                    />
                  )}

                  {activeTab === "roadmaps" && (
                    <CareerRoadmaps
                      roadmaps={CAREER_ROADMAPS}
                      tracks={tracks}
                      setActiveTab={setActiveTab}
                    />
                  )}

                  {activeTab === "social" && (
                    <SocialArea
                      userXpThisWeek={450 + stats.xp * 0.1}
                      userLevel={stats.level}
                      awardXp={awardXp}
                      awardCoins={awardCoins}
                      triggerStreakMultiplier={triggerStreakMultiplier}
                    />
                  )}

                  {activeTab === "premium" && (
                    <MonetizationPage
                      stats={stats}
                      activatePremium={activatePremiumInParentState}
                    />
                  )}
                </main>
              </div>
            </div>
          );
        }

        // MOUNT APP INSTANCE
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
